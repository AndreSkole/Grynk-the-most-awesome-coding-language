name: Build and Release

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller colorama requests beautifulsoup4 openai

    - name: Build with PyInstaller
      run: python build.py

    - name: Build Windows Installer
      if: matrix.os == 'windows-latest'
      run: iscc installer.iss

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: grynk-${{ matrix.os }}
        path: |
          dist/grynk
          dist/grynk.exe
          dist/Grynk_Windows_Installer.exe

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Download all artifacts
      uses: actions/download-artifact@v4

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          grynk-windows-latest/grynk.exe
          grynk-windows-latest/Grynk_Windows_Installer.exe
          grynk-ubuntu-latest/grynk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
